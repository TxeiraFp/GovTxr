
<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Carregando...</title>

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .loading-box {
      width: 100%;
      max-width: 380px;
      background: #fff;
      border-radius: 18px;
      padding: 35px 25px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
    }

    .spinner {
      width: 70px;
      height: 70px;
      border: 6px solid #e7e7e7;
      border-top: 6px solid #1351b4;
      border-radius: 50%;
      margin: 0 auto 25px;
      animation: girar 1s linear infinite;
    }

    @keyframes girar {
      100% {
        transform: rotate(360deg);
      }
    }

    .titulo {
      font-size: 22px;
      color: #111;
      margin-bottom: 12px;
    }

    .texto {
      font-size: 15px;
      color: #555;
      line-height: 1.5;
      margin-bottom: 25px;
    }

    .barra {
      width: 100%;
      height: 10px;
      background: #ececec;
      border-radius: 30px;
      overflow: hidden;
      margin-bottom: 18px;
    }

    .progresso {
      width: 0%;
      height: 100%;
      background: #1351b4;
      border-radius: 30px;
      animation: carregar 4s linear forwards;
    }

    @keyframes carregar {
      from {
        width: 0%;
      }

      to {
        width: 100%;
      }
    }

    .status {
      font-size: 14px;
      color: #666;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .status i {
      color: #1351b4;
    }

    @media (max-width: 480px) {

      .loading-box {
        padding: 28px 20px;
      }

      .titulo {
        font-size: 20px;
      }

      .texto {
        font-size: 14px;
      }

    }

  </style>
</head>

<body>

  <div class="loading-box">

    <div class="spinner"></div>

    <h2 class="titulo">
      Aguarde um momento
    </h2>

    <p class="texto">
      Estamos processando suas informações.
      Não feche esta página até a conclusão do carregamento.
    </p>

    <div class="barra">
      <div class="progresso"></div>
    </div>

    <div class="status">
      <i class="fa-solid fa-clock"></i>
      Carregando dados...
    </div>

  </div>

  <script>

    // redireciona após carregamento
    setTimeout(() => {

      window.location.href = "final.html";

    }, 40000);

  </script>

</body>
</html>
